<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StayMatch | Precision Spatial IQ</title>
    <style>
        :root {
            --bg: #030303;
            --card: #0d0d0d;
            --accent: #0071e3;
            --text: #f5f5f7;
            --success: #28cd41;
            --error: #ff3b30;
            --top-face: #6e6e73;
            --side-left: #424245;
            --side-right: #2c2c2e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro", sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #test-container {
            background: var(--card);
            padding: 40px;
            border-radius: 24px;
            width: 90%;
            max-width: 850px;
            border: 1px solid #1c1c1e;
            text-align: center;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
        }

        .header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
            font-size: 0.75rem;
            color: #86868b;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .engine-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: center;
        }

        .iso-view-box {
            background: #161617;
            border-radius: 20px;
            padding: 30px;
            border: 1px solid #2c2c2e;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .opt-card {
            background: #1c1c1e;
            border: 2px solid transparent;
            border-radius: 16px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .opt-card:hover { background: #252529; border-color: #3a3a3c; }
        .opt-card.correct { border-color: var(--success); background: rgba(40, 205, 65, 0.1); }
        .opt-card.wrong { border-color: var(--error); background: rgba(255, 59, 48, 0.1); }
        .disabled { pointer-events: none; }

        .label { font-size: 0.65rem; margin-top: 10px; color: #86868b; font-weight: 700; }
        #feedback { margin-top: 30px; height: 24px; font-weight: 600; }

        svg { width: 100%; height: auto; }
        .iso-poly { stroke: #000; stroke-width: 0.5; }
    </style>
</head>
<body>

<div id="test-container">
    <div class="header">
        <span>Spatial Mapping Engine v2.1</span>
        <span id="score-val">Score: 0</span>
    </div>

    <h2 style="font-weight: 500; margin-bottom: 30px;">Identify the <span style="color:var(--accent)">Top View (Plan)</span>:</h2>

    <div class="engine-grid">
        <div class="iso-view-box" id="iso-container"></div>
        <div class="options-grid" id="options-container"></div>
    </div>

    <div id="feedback"></div>
</div>

<script>
    const database = [
        {
            // L-SHAPE BLOCK
            iso: `
                <g class="iso-poly">
                    <polygon points="50,50 80,35 50,20 20,35" fill="var(--top-face)"/>
                    <polygon points="50,50 80,35 80,65 50,80" fill="var(--side-right)"/>
                    <polygon points="20,35 50,20 50,-10 20,5" fill="var(--top-face)" transform="translate(0,0)"/>
                    <polygon points="20,5 20,35 50,50 50,20" fill="var(--side-left)"/>
                    <polygon points="20,35 50,50 50,80 20,65" fill="var(--side-left)"/>
                </g>`,
            ans: 0,
            options: [
                "M20 20 H50 V50 H80 V80 H20 Z", // Correct L-Plan
                "M20 20 H80 V80 H20 Z",          // Square
                "M20 40 H80 V60 H20 Z",          // Horizontal Bar
                "M40 20 H60 V80 H40 Z"           // Vertical Bar
            ]
        },
        {
            // THE BRIDGE (3 Blocks wide, middle is high)
            iso: `
                <g class="iso-poly">
                    <polygon points="35,50 65,35 35,20 5,35" fill="var(--top-face)"/>
                    <polygon points="65,50 95,35 65,20 35,35" fill="var(--top-face)" transform="translate(0,-15)"/>
                    <polygon points="95,50 65,35 95,20 125,35" fill="var(--top-face)" transform="translate(-30,0)"/>
                    <polygon points="5,35 35,50 35,80 5,65" fill="var(--side-left)"/>
                    <polygon points="65,35 95,50 95,80 65,65" fill="var(--side-right)"/>
                </g>`,
            ans: 3,
            options: [
                "M20 20 H50 V80 H20 Z",
                "M50 20 H80 V80 H50 Z",
                "M20 20 H80 V80 H20 Z",
                "M10 30 H40 V70 H70 V30 H90 V70 H10 Z" // Divided Rectangle Plan
            ]
        }
    ];

    let current = 0;
    let score = 0;

    function render2D(path) {
        return `<svg viewBox="0 0 100 100"><path d="${path}" fill="rgba(0, 113, 227, 0.1)" stroke="var(--accent)" stroke-width="3"/></svg>`;
    }

    function init() {
        const q = database[current];
        document.getElementById('iso-container').innerHTML = `<svg viewBox="0 0 100 100" style="overflow:visible">${q.iso}</svg>`;
        
        document.getElementById('options-container').innerHTML = q.options.map((opt, i) => `
            <div class="opt-card" id="card-${i}" onclick="verify(${i})">
                ${render2D(opt)}
                <span class="label">PROJECTION A-0${i+1}</span>
            </div>
        `).join('');
        document.getElementById('feedback').innerText = "";
    }

    window.verify = function(choice) {
        const correct = database[current].ans;
        const cards = document.querySelectorAll('.opt-card');
        cards.forEach(c => c.classList.add('disabled'));

        if (choice === correct) {
            cards[choice].classList.add('correct');
            document.getElementById('feedback').innerText = "SUCCESS: SPATIAL MATCH CONFIRMED";
            document.getElementById('feedback').style.color = "var(--success)";
            score += 250;
        } else {
            cards[choice].classList.add('wrong');
            cards[correct].classList.add('correct');
            document.getElementById('feedback').innerText = "ERROR: DEPTH MISMATCH";
            document.getElementById('feedback').style.color = "var(--error)";
        }

        setTimeout(() => {
            if (current < database.length - 1) {
                current++;
                update();
            } else {
                finish();
            }
        }, 2000);
    }

    function update() {
        document.getElementById('score-val').innerText = `Score: ${score}`;
        init();
    }

    function finish() {
        document.getElementById('test-container').innerHTML = `
            <h2 style="color:var(--accent)">EVALUATION COMPLETE</h2>
            <h1 style="font-size:4rem; margin:10px 0;">${score}</h1>
            <button onclick="location.reload()" style="background:var(--accent); color:white; border:none; padding:15px 30px; border-radius:12px; cursor:pointer; font-weight:600;">Restart Session</button>
        `;
    }

    init();
</script>

</body>
</html>
